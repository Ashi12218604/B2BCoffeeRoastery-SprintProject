<div class="login-universe" id="login-universe">
  <!-- ═══ BACKGROUND LAYERS ═══ -->
  <div class="bg-layer bg-image"></div>
  <div class="bg-layer bg-overlay"></div>

  <!-- ═══ LIGHT FLARE (Low-Velocity Animation) ═══ -->
  <div class="bg-layer light-flare"></div>

  <!-- ═══ STEAM WISPS ═══ -->
  <div class="steam-container">
    <div class="steam-wisp wisp-1"></div>
    <div class="steam-wisp wisp-2"></div>
    <div class="steam-wisp wisp-3"></div>
  </div>

  <!-- ═══ NAVIGATION BAR ═══ -->
  <nav class="top-nav animate-fade-in" id="top-nav">
    <div class="nav-left">
      <img src="/assets/images/brand-logo.png" alt="Ember & Bean Logo" class="nav-brand-logo">
      <span class="nav-brand-text">Ember <span class="nav-amp">&</span> Bean</span>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-link" id="nav-partners">For Partners</a>
      <a href="#" class="nav-link" id="nav-source">The Source</a>
      <a href="#" class="nav-link" id="nav-contact">Contact</a>
    </div>
  </nav>

  <!-- ═══ MAIN LAYOUT ═══ -->
  <div class="login-container">
    <div class="login-panel animate-fade-in-up" id="login-panel">
      
      <div class="panel-header">
        <div class="brand-logo-wrapper">
          <img src="/assets/images/brand-logo.png" alt="Ember & Bean Logo" class="auth-brand-logo">
          <h1 class="auth-brand-name">Ember <span class="auth-amp">&</span> Bean</h1>
          <span class="auth-tagline">Artisan Coffee Roasters</span>
        </div>
        <h2 class="panel-title">Welcome Back</h2>
        <p class="panel-subtitle">Sign in to your partner account</p>
      </div>

      <!-- Error Message -->
      <div class="error-banner" *ngIf="(error$ | async) as error" id="error-banner">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 4.5V8.5M8 10.5V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>{{ error }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" id="login-form">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email" class="form-label">EMAIL ADDRESS</label>
          <div class="input-wrapper" [class.focused]="emailFocused" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="1.5" y="3.5" width="15" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M1.5 5.5L9 10L16.5 5.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="your@company.com"
              (focus)="emailFocused = true"
              (blur)="emailFocused = false"
              autocomplete="email"
            />
          </div>
          <div class="field-error" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
            Email is required
          </div>
          <div class="field-error" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
            Enter a valid email address
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="form-label">PASSWORD</label>
          <div class="input-wrapper" [class.focused]="passwordFocused" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="3.5" y="7.5" width="11" height="8" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5.5 7.5V5.5C5.5 3.567 7.067 2 9 2C10.933 2 12.5 3.567 12.5 5.5V7.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Enter your password"
              (focus)="passwordFocused = true"
              (blur)="passwordFocused = false"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()" id="toggle-password" tabindex="-1">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1.5 9C1.5 9 4 3.5 9 3.5C14 3.5 16.5 9 16.5 9C16.5 9 14 14.5 9 14.5C4 14.5 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.2"/>
                <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.2"/>
              </svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 2L16 16M7.058 7.058C6.708 7.408 6.5 7.878 6.5 8.5C6.5 9.605 7.395 10.5 8.5 10.5C9.122 10.5 9.592 10.292 9.942 9.942M14.25 12.25C15.5 11 16.5 9 16.5 9C16.5 9 14 3.5 9 3.5C8.05 3.5 7.18 3.72 6.4 4.05M1.5 9C1.5 9 4 14.5 9 14.5C9.95 14.5 10.82 14.28 11.6 13.95" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="field-error" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
            Password is required
          </div>
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          class="btn-sign-in"
          id="btn-sign-in"
          [disabled]="loginForm.invalid || (loading$ | async)"
        >
          <span *ngIf="!(loading$ | async)">SIGN IN & SIP</span>
          <span *ngIf="loading$ | async" class="spinner-wrapper">
            <span class="brew-spinner"></span>
            BREWING...
          </span>
        </button>
      </form>

      <!-- Footer Links -->
      <div class="panel-footer">
        <a href="#" (click)="forgotPassword($event)" class="forgot-link" id="forgot-link">Forgot Password?</a>
        <div class="divider-line"></div>
        <p class="register-text">
          New to Ember & Bean?
          <a routerLink="/register" class="register-link" id="register-link">Register as Partner</a>
        </p>
      </div>
    </div>
  </div>
</div>
